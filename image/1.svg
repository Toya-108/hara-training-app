<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">基本設定アイコン</title>
  <desc id="desc">クリーム色と深緑色で構成した、歯車付きの基本設定ボタン風SVG</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#31443A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- subtle grid background -->
  <rect width="1024" height="1024" fill="#F6F1E5"/>
  <g stroke="#E9E1D1" stroke-width="2" opacity="0.8">
    <path d="M0 0H1024"/>
    <path d="M0 128H1024"/>
    <path d="M0 256H1024"/>
    <path d="M0 384H1024"/>
    <path d="M0 512H1024"/>
    <path d="M0 640H1024"/>
    <path d="M0 768H1024"/>
    <path d="M0 896H1024"/>
    <path d="M0 1024H1024"/>
    <path d="M0 0V1024"/>
    <path d="M128 0V1024"/>
    <path d="M256 0V1024"/>
    <path d="M384 0V1024"/>
    <path d="M512 0V1024"/>
    <path d="M640 0V1024"/>
    <path d="M768 0V1024"/>
    <path d="M896 0V1024"/>
    <path d="M1024 0V1024"/>
  </g>

  <!-- main tile -->
  <rect x="96" y="108" width="832" height="844" rx="56" fill="#455A4C" filter="url(#shadow)"/>

  <!-- gear icon -->
  <g transform="translate(512 420)">
    <!-- outer teeth -->
    <g fill="#EDE8DD">
      <rect x="-24" y="-178" width="48" height="70" rx="12"/>
      <rect x="-24" y="108" width="48" height="70" rx="12"/>
      <rect x="108" y="-24" width="70" height="48" rx="12"/>
      <rect x="-178" y="-24" width="70" height="48" rx="12"/>

      <rect x="-24" y="-178" width="48" height="70" rx="12" transform="rotate(45)"/>
      <rect x="-24" y="108" width="48" height="70" rx="12" transform="rotate(45)"/>
      <rect x="108" y="-24" width="70" height="48" rx="12" transform="rotate(45)"/>
      <rect x="-178" y="-24" width="70" height="48" rx="12" transform="rotate(45)"/>
    </g>

    <!-- gear body -->
    <circle r="122" fill="#F1ECE3"/>
    <circle r="86" fill="#455A4C" opacity="0.18"/>
    <circle r="56" fill="#F6F1E5"/>

    <!-- small accent knobs -->
    <circle cx="0" cy="-122" r="12" fill="#455A4C" opacity="0.35"/>
    <circle cx="122" cy="0" r="12" fill="#455A4C" opacity="0.35"/>
    <circle cx="0" cy="122" r="12" fill="#455A4C" opacity="0.35"/>
    <circle cx="-122" cy="0" r="12" fill="#455A4C" opacity="0.35"/>
  </g>

  <!-- label -->
  <text x="512" y="730"
        text-anchor="middle"
        font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif"
        font-size="104"
        font-weight="800"
        letter-spacing="2"
        fill="#F4F1EA">基本設定</text>
</svg>
